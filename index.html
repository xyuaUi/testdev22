<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Perbaiki Meta Viewport & Tambah Meta Description -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="PWA Cadangan Khusus Redmi 10 dengan Background 2400×1080, Mode Landscape Fullscreen Tanpa Notch.">
    
    <title>Cadangan PWA Redmi 10</title>
    
    <!-- Meta Tag PWA -->
    <meta name="application-name" content="PWA Redmi 10">
    <meta name="apple-mobile-web-app-title" content="PWA Redmi 10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-96x96.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" type="image/png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <img id="bg-image" src="assets/00.png" alt="Background 2400×1080">

    <script>
        // Daftarkan Service Worker dengan Error Handling
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const reg = await navigator.serviceWorker.register('service-worker.js');
                    console.log('Service Worker Terdaftar:', reg.scope);
                } catch (err) {
                    console.error('Gagal Daftarkan Service Worker:', err);
                }
            });
        }

        // Tangani Error Gambar
        document.getElementById('bg-image').addEventListener('error', (e) => {
            console.error('Gambar Tidak Dimuat:', e);
            e.target.style.backgroundColor = '#000';
        });
    </script>
</body>
</html>
