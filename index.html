<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>PWA Redmi 10 - Bisa Tekan</title>
    
    <meta name="application-name" content="PWA Redmi 10">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="PWA dengan Tombol di Tengah">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-96x96.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" type="image/png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Tombol/Teks di Tengah Layar */
        #btn-text {
            font-size: 48px;
            color: #fff;
            text-align: center;
            padding: 20px 50px;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
        }
        #btn-text:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="btn-text" onclick="handleClick()">TEKAN SAYA DISINI</div>

    <script>
        // Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('SW Terdaftar'))
                    .catch(err => console.error('Gagal SW:', err));
            });
        }

        // Fungsi Saat Ditekan
        function handleClick() {
            alert('Teks Ditekan! 🎉');
            // Bisa tambahin aksi lain disini, contoh: masuk fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
