<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Paksa Landscape -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="orientation" content="landscape">
    
    <title>PWA Landscape</title>
    
    <meta name="application-name" content="PWA Landscape">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-96x96.png" type="image/png">

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            border: none !important;
            outline: none !important;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        <!-- Latar Belakang 00.png -->
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        <!-- Teks Kecil Tanpa Border -->
        #click-text {
            font-size: 14px;
            color: #fff;
            text-align: center;
            cursor: pointer;
            user-select: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <img id="bg-image" src="assets/00.png" alt="Latar Belakang">
    <div id="click-text" onclick="handleClick()">Klik Saya</div>

    <script>
        // Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('SW Terdaftar'))
                    .catch(err => console.error('Gagal SW:', err));
            });
        }

        // Fungsi Saat Ditekan - Tidak Ada Aksi Visual
        function handleClick() {
            // Tidak ada popup/informasi apapun
        }
    </script>
</body>
</html>
