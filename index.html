<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadangan PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Cadangan PWA">
    <meta name="apple-mobile-web-app-title" content="Cadangan PWA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#FFA500">
    <meta name="theme-color" content="#FFA500">
    <meta name="description" content="Cadangan PWA siap digunakan untuk aplikasi mendatang">
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-96x96.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
</head>
<body>
    <!-- Halaman Kosong Sesuai Permintaan -->
    <script>
        // Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker terdaftar:', reg.scope))
                    .catch(err => console.log('Gagal mendaftarkan Service Worker:', err));
            });
        }

        // Tampilkan Tombol Instal Jika Mungkin
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Jika ingin menampilkan tombol instal meskipun halaman kosong, bisa tambahkan elemen di sini
            console.log('Tombol instal aplikasi siap ditampilkan');
        });
    </script>
</body>
</html>
