<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Paksa Landscape Fullscreen Anti Notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="orientation" content="landscape">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="msapplication-starturl" content=".">
    
    <!-- Hapus Teks Pencarian Google -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>PWA Fullscreen</title>
    
    <meta name="application-name" content="PWA Fullscreen">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-96x96.png" type="image/png">

    <style>
        /* Reset Total Semua Elemen */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            border: none !important;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important; /* Hapus Overlay Biru Chrome */
            tap-highlight-color: transparent !important;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            overflow: hidden !important;
            background-color: #000 !important;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Latar Belakang 00.png Paksa Fullscreen */
        #bg-image {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -1;
        }
        /* Teks Tanpa Pencarian Google */
        #click-text {
            font-size: 14px;
            color: #fff;
            text-align: center;
            cursor: pointer;
            user-select: none;
            z-index: 1;
            pointer-events: auto;
        }
        /* Hapus Elemen Bawaan Browser */
        ::-webkit-search-decoration,
        ::-webkit-search-cancel-button,
        ::-webkit-search-results-button,
        ::-webkit-search-results-decoration {
            display: none !important;
        }
        /* Paksa Fullscreen Tanpa Ruang Kosong */
        :-webkit-full-screen {
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
        }
        :fullscreen {
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
        }
    </style>
</head>
<body>
    <img id="bg-image" src="assets/00.png" alt="Latar Belakang">
    <div id="click-text" onclick="handleClick()">Klik Saya</div>

    <script>
        // Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('SW Terdaftar'))
                    .catch(err => console.error('Gagal SW:', err));
            });
        }

        // Paksa Fullscreen Otomatis Setelah Dimuat
        window.addEventListener('load', () => {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen({ navigationUI: "hide" });
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen({ navigationUI: "hide" });
            }
        });

        // Fungsi Saat Ditekan - Tidak Ada Aksi
        function handleClick() {
            // Tidak ada aksi apapun
        }

        // Hapus Garis Putih Atas Jika Muncul
        window.addEventListener('resize', () => {
            document.body.style.top = '0px !important';
            document.documentElement.style.top = '0px !important';
        });
    </script>
</body>
</html>
